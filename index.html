<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Journal Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-main">
        <div class="brand">
          <h1>Journal Tracker</h1>
          <p class="brand-subtitle">Scopus · WoS</p>
        </div>
        <nav class="index-links" aria-label="Index searches">
          <a href="https://www.scopus.com/sources.uri" rel="noreferrer" target="_blank">Scopus</a>
          <a href="https://mjl.clarivate.com/home" rel="noreferrer" target="_blank">Web of Science</a>
          <a href="https://doaj.org/search/journals" rel="noreferrer" target="_blank">DOAJ</a>
        </nav>
        <div class="summary" aria-live="polite">
          <span>journals tracked:</span>
          <strong id="journal-count">0</strong>
        </div>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="Journal filters">
        <label class="search">
          <span>Search</span>
          <input id="search" type="search" placeholder="Title, publisher, ISSN, subject">
        </label>

        <label>
          <span>Index</span>
          <select id="index-filter">
            <option value="all">All indexes</option>
            <option value="scopus">Scopus</option>
            <option value="web_of_science">Web of Science</option>
            <option value="both">Both</option>
          </select>
        </label>

        <label>
          <span>Quartile</span>
          <select id="quartile-filter">
            <option value="all">All quartiles</option>
          </select>
        </label>
      </section>

      <section class="table-wrap" aria-label="Tracked journals">
        <table>
          <colgroup>
            <col class="col-journal">
            <col class="col-indexes">
            <col class="col-issn">
            <col class="col-price">
            <col class="col-quartile">
            <col class="col-subjects">
            <col class="col-updated">
          </colgroup>
          <thead>
            <tr>
              <th>Journal</th>
              <th>Indexes</th>
              <th>ISSN</th>
              <th>Price</th>
              <th>Quartile</th>
              <th>Subjects</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody id="journal-rows"></tbody>
        </table>
        <p id="empty-state" class="empty" hidden>No journals match the current filters.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
